<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | DU Notes</title>

<link rel="stylesheet" href="style.css">

<style>

.login-container{
max-width:500px;
margin:100px auto;
padding:40px;
background:white;
border-radius:24px;
border:1px solid #e5e7eb;
box-shadow:0 10px 40px rgba(0,0,0,.05);
}

.login-container h1{
text-align:center;
margin-bottom:15px;
}

.login-container p{
text-align:center;
color:#6b7280;
margin-bottom:30px;
}

.google-btn{
width:100%;
padding:16px;
background:white;
border:1px solid #d1d5db;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-bottom:20px;
}

.divider{
text-align:center;
margin:25px 0;
color:#9ca3af;
}

.input{
width:100%;
padding:16px;
border:1px solid #d1d5db;
border-radius:12px;
margin-bottom:15px;
font-size:16px;
}

.login-btn{
width:100%;
padding:16px;
background:#6D28D9;
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.note{
margin-top:20px;
font-size:14px;
text-align:center;
color:#6b7280;
}

</style>

</head>
<body>

<nav class="navbar">

<div class="logo">
DU NOTES
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="pyqs.html">PYQs</a>
</div>

</nav>

<div class="login-container">

<h1>Welcome Back</h1>

<p>
Access your purchased notes and free resources.
</p>

<button class="google-btn">
Continue with Google
</button>

<div class="divider">
OR
</div>

<input
type="email"
placeholder="Enter Email Address"
class="input">

<button class="login-btn">
Send OTP
</button>

<div class="note">
Google Login & Email OTP will be connected later.
</div>

</div>

</body>
</html>
